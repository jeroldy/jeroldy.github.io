<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jeroldy</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
    background-color: black;
}

/* Background video - Starts Blurred */
video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
    filter: blur(15px);
    transition: filter 1.5s ease;
}

/* Dark overlay */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: -1;
}

/* ENTER SCREEN */
#enter {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7); 
    backdrop-filter: blur(25px); 
    -webkit-backdrop-filter: blur(25px);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2rem;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    z-index: 10;
    transition: opacity 0.8s ease, backdrop-filter 0.8s ease;
}

/* MAIN CONTAINER */
.wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: calc(100% - 90px);
    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 1000px;
}

.container {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    will-change: transform;
}

/* GLOW TEXT */
h1 {
    font-size: 3rem;
    margin: 10px 0;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px white; }
    to { text-shadow: 0 0 30px white, 0 0 60px white; }
}

img.pfp {
    width: 120px;
    border-radius: 50%;
    margin-bottom: 10px;
}

/* LINKS - 0.25 transparency */
.links a {
    display: block;
    margin: 10px auto;
    padding: 12px;
    width: 220px;
    background: rgba(10, 25, 10, 0.25); 
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    border: 1px solid rgba(150, 200, 150, 0.15); 
    border-radius: 12px;
    text-decoration: none;
    color: white;
    transition: 0.3s ease;
}

.links a:hover {
    background: rgba(150, 255, 150, 0.2); 
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(150, 255, 150, 0.2); 
}

/* PLAYER BAR - 0.25 transparency */
#player-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 90px;
    background: rgba(10, 25, 10, 0.25); 
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-top: 1px solid rgba(150, 200, 150, 0.2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 30px;
    box-sizing: border-box;
    z-index: 5;
}

.track-info { display: flex; align-items: center; width: 30%; }
.album-art { width: 65px; height: 65px; border-radius: 8px; margin-right: 18px; }
.track-text h4 { margin: 0; font-size: 1.1rem; text-shadow: 0 0 5px rgba(150, 255, 150, 0.5); }
.track-text p { margin: 0; font-size: 0.85rem; color: #a3bca3; }

.player-controls { display: flex; flex-direction: column; align-items: center; width: 40%; }
.buttons { display: flex; align-items: center; gap: 25px; margin-bottom: 8px; }
.control-btn { cursor: pointer; font-size: 1.3rem; opacity: 0.75; color: #e0eee0; transition: 0.2s; }
.control-btn:hover { opacity: 1; color: #aaffaa; transform: scale(1.08); }

.progress-container { width: 100%; display: flex; align-items: center; gap: 12px; }
.progress-bar { flex-grow: 1; height: 5px; background: rgba(100, 120, 100, 0.4); border-radius: 3px; position: relative; cursor: pointer; }
#progress { width: 0%; height: 100%; background: #ccffcc; border-radius: 3px; box-shadow: 0 0 10px rgba(150, 255, 150, 0.6); }
.time { font-size: 0.75rem; color: #a3bca3; min-width: 35px; }

/* VOLUME SLIDER */
.volume-section { width: 30%; display: flex; justify-content: flex-end; align-items: center; gap: 10px; }
#volume-slider { -webkit-appearance: none; appearance: none; width: 100px; height: 4px; background: rgba(100, 120, 100, 0.4); border-radius: 2px; outline: none; cursor: pointer; }
#volume-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 12px; height: 12px; background: #ccffcc; border-radius: 50%; cursor: pointer; box-shadow: 0 0 8px rgba(150, 255, 150, 0.8); }
#mute-icon { font-size: 1.1rem; color: #a3bca3; cursor: pointer; }

</style>
</head>

<body>

<div id="enter">click to enter</div>

<video id="bgVideo" autoplay muted loop>
    <source src="ssstik.io_@bob305890_1773894028146.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="wrapper">
    <div class="container" id="main">
        <img src="jeroldtwitchpfp.jpg" class="pfp">
        <h1 id="name"></h1>
        <p>📍 killwaukee</p>

        <div class="links">
            <a href="https://www.instagram.com/oliiverrg" target="_blank">instagram</a>
            <a href="https://www.tiktok.com/@oliver.org" target="_blank">tiktok</a>
            <a href="https://discord.com/users/675104449160806400">discord</a>
            <a href="https://www.twitch.tv/jeroldy">twitch</a>
            <a href="https://www.youtube.com/@jeroldyt">youtube</a>
        </div>
    </div>
</div>

<div id="player-bar">
    <div class="track-info">
        <img src="myshitaboogie.png" alt="TBA Album Cover" class="album-art">
        <div class="track-text">
            <h4>My Shit</h4>
            <p>A Boogie Wit Da Hoodie</p>
        </div>
    </div>

    <div class="player-controls">
        <div class="buttons">
            <div class="control-btn">⏮</div>
            <div id="playPause" class="control-btn">⏸</div>
            <div class="control-btn">⏭</div>
        </div>
        <div class="progress-container">
            <span class="time" id="current-time">0:00</span>
            <div class="progress-bar"><div id="progress"></div></div>
            <span class="time" id="duration">0:00</span>
        </div>
    </div>

    <div class="volume-section">
        <span id="mute-icon">🔊</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.3">
    </div>
</div>

<audio id="music" loop crossOrigin="anonymous">
    <source src="242326090.mp3" type="audio/mpeg">
</audio>

<script>
const enter = document.getElementById("enter");
const music = document.getElementById("music");
const bgVideo = document.getElementById("bgVideo");
const playPause = document.getElementById("playPause");
const container = document.getElementById("main");
const progressBar = document.getElementById("progress");
const volumeSlider = document.getElementById("volume-slider");
const muteIcon = document.getElementById("mute-icon");

let audioCtx, lowPassFilter, source;
let isPaused = false;

// Setup the Audio Web API for the muffle effect
function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    source = audioCtx.createMediaElementSource(music);
    lowPassFilter = audioCtx.createBiquadFilter();
    lowPassFilter.type = "lowpass";
    lowPassFilter.frequency.value = 400; // Start muffled (low frequency)
    source.connect(lowPassFilter);
    lowPassFilter.connect(audioCtx.destination);
}

/* --- ENTER SCREEN --- */
enter.addEventListener("click", () => {
    initAudio();
    
    // Smoothly clear audio frequency and video blur
    lowPassFilter.frequency.setTargetAtTime(20000, audioCtx.currentTime, 0.5);
    bgVideo.style.filter = "blur(0px)";

    enter.style.opacity = "0";
    setTimeout(() => { enter.style.display = "none"; }, 800);

    music.volume = volumeSlider.value;
    music.play();
});

/* --- PLAY/PAUSE --- */
playPause.addEventListener("click", () => {
    if (music.paused) {
        music.play();
        playPause.innerText = "⏸";
        isPaused = false;
    } else {
        music.pause();
        playPause.innerText = "▶";
        isPaused = true;
    }
});

/* --- VOLUME SLIDER --- */
volumeSlider.addEventListener("input", (e) => {
    music.volume = e.target.value;
    updateMuteIcon(e.target.value);
});

function updateMuteIcon(volume) {
    if (volume == 0) muteIcon.innerText = "🔇";
    else if (volume < 0.5) muteIcon.innerText = "🔉";
    else muteIcon.innerText = "🔊";
}

/* --- TAB VISIBILITY (Re-muffle on hide) --- */
document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") {
        if (lowPassFilter) lowPassFilter.frequency.value = 400;
    } else {
        if (enter.style.display === "none" && !isPaused) {
            lowPassFilter.frequency.setTargetAtTime(20000, audioCtx.currentTime, 0.5);
        }
    }
});

/* --- PROGRESS BAR --- */
music.addEventListener("timeupdate", () => {
    const curr = music.currentTime;
    const dur = music.duration;
    if (dur) {
        progressBar.style.width = (curr / dur) * 100 + "%";
        document.getElementById("current-time").innerText = formatTime(curr);
        document.getElementById("duration").innerText = formatTime(dur);
    }
});

function formatTime(secs) {
    const mins = Math.floor(secs / 60);
    const s = Math.floor(secs % 60);
    return `${mins}:${s < 10 ? '0' : ''}${s}`;
}

/* --- TYPING EFFECT --- */
const text = "jeroldy";
let i = 0;
function type() {
    if (i < text.length) {
        document.getElementById("name").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 100);
    }
}
type();

/* --- PARALLAX --- */
let targetX = 0, targetY = 0, currentX = 0, currentY = 0;
document.addEventListener("mousemove", (e) => {
    targetX = (window.innerWidth / 2 - e.clientX) / 20;
    targetY = (window.innerHeight / 2 - e.clientY) / 20;
});
function animateParallax() {
    currentX += (targetX - currentX) * 0.08;
    currentY += (targetY - currentY) * 0.08;
    container.style.transform = `rotateY(${currentX}deg) rotateX(${currentY}deg)`;
    requestAnimationFrame(animateParallax);
}
animateParallax();
</script>

</body>
</html>
